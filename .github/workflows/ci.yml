name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Dependency audit
        run: pip-audit -r requirements.txt --cache-dir .pip-audit-cache

      - name: Static security scan
        run: bandit -q -r app -c pyproject.toml

      - name: Generate SBOM
        run: cyclonedx-py requirements requirements.txt --of JSON --output-reproducible --output-file sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: cyclonedx-sbom
          path: sbom.json
          if-no-files-found: error

      - name: Test with coverage
        run: pytest --cov=app --cov=scripts --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

      - name: Run AI evaluation dry run
        run: python scripts/ai_ci_dry_run.py --output-dir tmp-test-data/ai-ci-dry-run

      - name: Upload AI dry-run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-ci-dry-run
          path: tmp-test-data/ai-ci-dry-run
          if-no-files-found: error
