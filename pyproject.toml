[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
    ".git",
    ".pytest-tmp",
    ".tmp",
    ".uv-cache",
    ".uv-python",
    ".venv",
    ".venv-*",
    "tmp",
    "tmp-test-data",
    "scratch_check",
    "tmp*",
    "venv",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["B008"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.coverage.run]
branch = true
source = ["app", "scripts"]
omit = [
    "tests/*",
]

[tool.coverage.report]
show_missing = true
skip_covered = true
exclude_lines = [
    "if __name__ == .__main__.:",
    "pragma: no cover",
]

[tool.bandit]
exclude_dirs = [
    ".git",
    ".pytest-tmp",
    ".tmp",
    ".uv-cache",
    ".uv-python",
    ".venv",
    ".venv-broken-*",
    ".venv-py314-*",
    "docs",
    "scratch_check",
    "tests",
    "tmp",
    "tmp-test-data",
    "venv",
]
