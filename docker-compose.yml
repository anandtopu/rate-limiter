services:
  web:
    build: .
    ports:
      - "8001:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENABLE_TRACING=${ENABLE_TRACING:-false}
      - TRACE_CONSOLE_EXPORTER=${TRACE_CONSOLE_EXPORTER:-true}
      - TRACE_OTLP_ENABLED=${TRACE_OTLP_ENABLED:-false}
      - TRACE_OTLP_ENDPOINT=${TRACE_OTLP_ENDPOINT:-http://otel-collector:4318/v1/traces}
      - TRACE_OTLP_TIMEOUT_S=${TRACE_OTLP_TIMEOUT_S:-5}
      - PERSIST_TELEMETRY=${PERSIST_TELEMETRY:-false}
      - TELEMETRY_DB_PATH=${TELEMETRY_DB_PATH:-data/telemetry.sqlite3}
      - TRUSTED_PROXY_IPS=${TRUSTED_PROXY_IPS:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=2).read()"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6378:6379"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    profiles:
      - tracing
    command:
      - "--config=/etc/otelcol/config.yaml"
    volumes:
      - ./otel-collector-config.yml:/etc/otelcol/config.yaml:ro
    ports:
      - "14317:4317"
      - "14318:4318"
